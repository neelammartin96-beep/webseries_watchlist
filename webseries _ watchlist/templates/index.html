<!DOCTYPE html>
<html>
<head>
    <title>Webseries Watchlist</title>
</head>
<body>

    <h1>🎬 Webseries Watchlist</h1>

    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="Series Title" required>
        <input type="text" name="genre" placeholder="Genre" required>

        <select name="status">
            <option>Watching</option>
            <option>Completed</option>
            <option>Plan to Watch</option>
        </select>

        <button type="submit">Add</button>
    </form>

    <h2>Your List</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Genre</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for s in series %}
        <tr>
            <td>{{ s[0] }}</td>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
            <td>{{ s[3] }}</td>
            <td>
                <a href="/delete/{{ s[0] }}">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
