<!DOCTYPE html>
<html>
<head>
    <title>Webseries Watchlist</title>
</head>
<body>

<h1>Webseries Watchlist</h1>

<form action="/add" method="POST">
    <input type="text" name="title" placeholder="Title" required>
    <input type="text" name="genre" placeholder="Genre" required>

    <select name="status">
        <option>Watching</option>
        <option>Completed</option>
        <option>Plan to Watch</option>
    </select>

    <button type="submit">Add</button>
</form>

<h2>Your List</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Genre</th>
    <th>Status</th>
</tr>

{% for row in data %}
<tr>
    <td>{{row[0]}}</td>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[3]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
